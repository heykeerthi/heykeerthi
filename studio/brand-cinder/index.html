adding:18px 18px 40px;\">\n\n      <!-- Bank 1: layouts -->\n      <div style=\"display:flex;align-items:center;gap:8px;margin:0 0 12px;\">\n        <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:12px;letter-spacing:2.5px;color:#1D1D19;\">LAYOUTS<\u002Fspan>\n        <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:10px;color:#fff;background:#4180BE;border-radius:10px;padding:2px 7px;\">{{ layoutCount }}<\u002Fspan>\n        <span style=\"flex:1;height:1px;background:#E4E0D2;\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:28px;\">\n        <sc-for list=\"{{ layoutThumbs }}\" as=\"t\" hint-placeholder-count=\"6\">\n          <button sc-camel-on-click=\"{{ t.select }}\" style=\"{{ t.style }}\">\n            <div style=\"{{ t.boxStyle }}\">{{ t.el }}<\u002Fdiv>\n            <span style=\"display:block;font-family:'Archivo',sans-serif;font-weight:700;font-size:10px;letter-spacing:0.6px;color:#5b5749;padding:6px 4px;text-align:center;background:#FAFBF6;border-top:1px solid #EDEADD;\">{{ t.label }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- Bank 2: colourways -->\n      <div style=\"display:flex;align-items:center;gap:8px;margin:0 0 12px;\">\n        <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:12px;letter-spacing:2.5px;color:#1D1D19;\">COLOURWAYS<\u002Fspan>\n        <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:10px;color:#fff;background:#4180BE;border-radius:10px;padding:2px 7px;\">4<\u002Fspan>\n        <span style=\"flex:1;height:1px;background:#E4E0D2;\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:6px;margin-bottom:11px;\">\n        <sc-for list=\"{{ themeThumbs }}\" as=\"th\" hint-placeholder-count=\"3\">\n          <button sc-camel-on-click=\"{{ th.select }}\" style=\"{{ th.style }}\">{{ th.swatchEl }}{{ th. 02Fsc-for>\n        <button sc-camel-on-click=\"{{ onSaveShape }}\" style=\"width:100%;margin-top:4px;padding:11px;background:#4180BE;color:#F3F1E8;border:none;border-radius:7px;font-family:'Archivo',sans-serif;font-weight:800;font-size:11px;letter-spacing:1px;cursor:pointer;box-shadow:0 4px 12px rgba(65,128,190,0.28);\">+ SAVE TO GRAPHICS BANK<\u002Fbutton>\n        <sc-if value=\"{{ hasCustom }}\">\n          <div style=\"margin-top:12px;border-top:1px solid #EDEADD;padding-top:11px;\">\n            <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:9.5px;letter-spacing:1.3px;color:#7c9bc0;margin-bottom:8px;\">SAVED SHAPES · TAP TO USE<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:8px;\">\n              <sc-for list=\"{{ customShapes }}\" as=\"c\" hint-placeholder-count=\"0\">\n                <div style=\"position:relative;\">\n                  <button sc-camel-on-click=\"{{ c.select }}\" title=\"{{ c.label }}\" style=\"{{ c.style }}\">\n                    <div style=\"aspect-ratio:1/1;\">{{ c.el }}<\u002Fdiv>\n                  <\u002Fbutton>\n                  <button sc-camel-on-click=\"{{ c.remove }}\" title=\"Delete shape\" style=\"position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:#8a5a12;color:#fff;border:1.5px solid #FAFBF6;font-size:9px;line-height:1;cursor:pointer;padding:0;\">✕<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <p style=\"margin:9px 2px 0;font-family:'Archivo',sans-serif;font-weight:500;font-size:10px;line-height:1.5;color:#8f8b7c;\">Saved shapes also appear in the Graphics bank above — pick one as any slide's hero.<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Faside>\n\n    <!-- ============ CENTER: PREVIEW ============ -->\n    <section style=\"position:relative;min-width:0;min-height:0;display:flex;flex-direction:column;align-items: erflow-x:auto;padding:6px 2px 2px;\">\n            <sc-for list=\"{{ carouselThumbs }}\" as=\"c\" hint-placeholder-count=\"0\">\n              <div style=\"flex:none;width:74px;\">\n                <div style=\"width:74px;aspect-ratio:1080/1350;border-radius:5px;overflow:hidden;border:1px solid #B9CDE5;background:#fff;position:relative;box-shadow:0 2px 6px rgba(40,70,110,0.14);\">\n                  {{ c.el }}\n                  <span style=\"position:absolute;top:3px;left:3px;background:rgba(29,29,25,0.62);color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:8px;padding:1px 5px;border-radius:6px;\">{{ c.num }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:3px;margin-top:3px;\">\n                  <button sc-camel-on-click=\"{{ c.up }}\" title=\"Move left\" style=\"flex:1;padding:2px;background:#EAF1F9;border:1px solid #CBD9EA;border-radius:4px;color:#3C7CBD;font-weight:800;font-size:10px;cursor:pointer;\">‹<\u002Fbutton>\n                  <button sc-camel-on-click=\"{{ c.down }}\" title=\"Move right\" style=\"flex:1;padding:2px;background:#EAF1F9;border:1px solid #CBD9EA;border-radius:4px;color:#3C7CBD;font-weight:800;font-size:10px;cursor:pointer;\">›<\u002Fbutton>\n                  <button sc-camel-on-click=\"{{ c.remove }}\" title=\"Remove\" style=\"flex:1;padding:2px;background:#FBEDE3;border:1px solid #E7C583;border-radius:4px;color:#8a5a12;font-weight:800;font-size:9px;cursor:pointer;\">✕<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n\n    <\u002Fsection>\n\n    <!-- ============ RIGHT: CONTROLS + EXPORT ============ -->\n    <aside style=\"border-left:1px solid #E4E0D2;background:#FAFBF6;overflow-y:auto;padding:22px 20px 40px;display:flex;flex-direction:column;gap:20px;\">\n\n      <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:10px;letter-spacing:1.2px;color:#8f8b7c;border-bottom:1px solid #EDEADD;padding-bottom:12px;\">{{ caption }}<\u002Fdiv>\n\n      <div>\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:11px;letter-spacing:2.5px;color:#a9a493;margin-bottom:12px;\">CONTENT<\u002Fdiv>\n        <sc-for list=\"{{ fields }}\" as=\"f\" hint-placeholder-count=\"3\">\n          <div style=\"margin-bottom:12px;\">\n            <label style=\"display:block;font-family:'Archivo',sans-serif;font-weight:800;font-size:9.5px;letter-spacing:1.3px;color:#7c9bc0;margin-bottom:5px;\">{{ f.label }}<\u002Flabel>\n            <sc-if value=\"{{ f.ml }}\">\n              <textarea rows=\"2\" value=\"{{ f.value }}\" placeholder=\"{{ f.ph }}\" sc-camel-on-change=\"{{ f.onChange }}\" style=\"width:100%;resize:vertical;box-sizing:border-box;padding:9px 10px;border:1px solid #DBD7C9;border-radius:7px;background:#fff;font-family:'Archivo',sans-serif;font-size:13px;color:#1D1D19;line-height:1.35;\"><\u002Ftextarea>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ f.single }}\">\n              <input value=\"{{ f.value }}\" placeholder=\"{{ f.ph }}\" sc-camel-on-change=\"{{ f.onChange }}\" style=\"width:100%;box-sizing:border-box;padding:9px 10px;border:1px solid #DBD7C9;border-radius:7px;background:#fff;font-family:'Archivo',sans-serif;font-size:13px;color:#1D1D19;\">\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div>\n          <label style=\"display:block;font-family:'Archivo',sans-serif;font-weight:800;font-size:9.5px;letter-spacing:1.3px;color:#7c9bc0;margin-bottom:5px;\">Hashtag · centered<\u002Flabel>\n          <input value=\"{{ hashtag }}\" placeholder=\"#yourhashtag\" sc-camel-on-change=\"{{ onHashtag }}\" style=\"width:100%;box-sizing:border-box;padding:9px 10px;border:1px solid #DBD7C9;border-radius:7px;background:#fff;font-family:'Archivo',sans-serif;font-size:13px;color:#1D1D19;\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasPhoto }}\">\n        <div>\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:11px;letter-spacing:2.5px;color:#a9a493;margin-bottom:12px;\">PHOTO<\u002Fdiv>\n          <sc-for list=\"{{ photoSlots }}\" as=\"p\" hint-placeholder-count=\"1\">\n            <div style=\"display:flex;gap:10px;align-items:center;margin-bottom:10px;\">\n              <div style=\"width:54px;height:54px;flex:none;border-radius:7px;overflow:hidden;border:1px solid #DBD7C9;\">{{ p.previewEl }}<\u002Fdiv>\n              <div style=\"flex:1;min-width:0;\">\n                <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:9.5px;letter-spacing:1.3px;color:#7c9bc0;margin-bottom:5px;\">{{ p.label }}<\u002Fdiv>\n                <div style=\"display:flex;gap:6px;\">\n                  <label style=\"flex:1;text-align:center;padding:8px 6px;background:#4180BE;color:#F3F1E8;border-radius:6px;font-family:'Archivo',sans-serif;font-weight:800;font-size:10px;letter-spacing:0.5px;cursor:pointer;\">\n                    <input type=\"file\" accept=\"image/*\" sc-camel-on-change=\"{{ p.onUpload }}\" style=\"display:none;\">{{ p.btnLabel }}\n                  <\u002Flabel>\n                  <sc-if value=\"{{ p.hasImg }}\">\n                    <button sc-camel-on-click=\"{{ p.onRemove }}\" style=\"padding:8px 11px;background:#F3F1E8;color:#8a5a12;border:1px solid #E4E0D2;border-radius:6px;font-family:'Archivo',sans-serif;font-weight:800;font-size:11px;cursor:pointer;\">✕<\u002Fbutton>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <p style=\"margin:2px 0 0;font-family:'Archivo',sans-serif;font-weight:500;font-size:9.5px;line-height:1.5;color:#a9a493;\">Your image fills the mount; the frame keeps its collage finish.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">\n          <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:11px;letter-spacing:2.5px;color:#a9a493;\">{{ transformTitle }}<\u002Fspan>\n          <sc-if value=\"{{ hasTransform }}\">\n            <button sc-camel-on-click=\"{{ onResetTransform }}\" style=\"background:none;border:none;color:#4180BE;font-family:'Archivo',sans-serif;font-weight:800;font-size:9.5px;letter-spacing:0.5px;cursor:pointer;padding:0;\">RESET<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <sc-if value=\"{{ isCollage }}\">\n          <div style=\"display:flex;gap:6px;margin-bottom:11px;\">\n            <sc-for list=\"{{ collageTargets }}\" as=\"ct\" hint-placeholder-count=\"2\">\n              <button sc-camel-on-click=\"{{ ct.select }}\" style=\"{{ ct.style }}\">{{ ct.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-for list=\"{{ transformParams }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <div style=\"margin-bottom:9px;\">\n            <div style=\"display:flex;justify-content:space-between;font-family:'Archivo',sans-serif;font-weight:700;font-size:9.5px;letter-spacing:0.8px;color:#7c9bc0;margin-bottom:4px;\"><span>{{ p.label }}<\u002Fspan><span>{{ p.display }}<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" min=\"{{ p.min }}\" max=\"{{ p.max }}\" step=\"{{ p.step }}\" value=\"{{ p.value }}\" sc-camel-on-change=\"{{ p.onInput }}\" style=\"width:100%;accent-color:#4180BE;\">\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"margin-top:2px;border-top:1px dashed #EDEADD;padding-top:11px;\">\n          <div style=\"display:flex;justify-content:space-between;font-family:'Archivo',sans-serif;font-weight:700;font-size:9.5px;letter-spacing:0.8px;color:#7c9bc0;margin-bottom:4px;\"><span>{{ textDyParam.label }}<\u002Fspan><span>{{ textDyParam.display }}<\u002Fspan><\u002Fdiv>\n          <input type=\"range\" min=\"{{ textDyParam.min }}\" max=\"{{ textDyParam.max }}\" step=\"{{ textDyParam.step }}\" value=\"{{ textDyParam.value }}\" sc-camel-on-change=\"{{ textDyParam.onInput }}\" style=\"width:100%;accent-color:#4180BE;\">\n        <\u002Fdiv>\n        <p style=\"margin:8px 0 0;font-family:'Archivo',sans-serif;font-weight:500;font-size:9.5px;line-height:1.5;color:#a9a493;\">Graphic sliders move the collage object or photo; <b>Move Text ↕<\u002Fb> slides the whole headline / body block up or down.<\u002Fp>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ overflow }}\">\n        <div style=\"display:flex;align-items:center;gap:8px;background:#FBE8D0;border:1px solid #E7C583;color:#8a5a12;font-family:'Archivo',sans-serif;font-weight:700;font-size:11px;padding:10px 12px;border-radius:8px;\">⚠ {{ overflowMsg }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ noOverflow }}\">\n        <div style=\"display:flex;align-items:center;gap:8px;background:#E4F0E4;border:1px solid #A9CFA9;color:#3d6b3d;font-family:'Archivo',sans-serif;font-weight:700;font-size:11px;padding:10px 12px;border-radius:8px;\">✓ Headline fits the frame<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div>\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:11px;letter-spacing:2.5px;color:#a9a493;margin-bottom:10px;\">EXPORT SLIDE<\u002Fdiv>\n        <button sc-camel-on-click=\"{{ exportPNG }}\" style=\"width:100%;padding:15px;background:#4180BE;color:#F3F1E8;border:none;border-radius:9px;font-family:'Archivo',sans-serif;font-weight:800;font-size:12px;letter-spacing:1.5px;cursor:pointer;box-shadow:0 5px 16px rgba(65,128,190,0.32);\">{{ exportLabel }}<\u002Fbutton>\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:9.5px;letter-spacing:1.3px;color:#a9a493;margin:16px 0 7px;\">SELECTED GRAPHIC · TRANSPARENT<\u002Fdiv>\n        <div style=\"display:flex;gap:8px;\">\n          <button sc-camel-on-click=\"{{ onEPNG }}\" style=\"flex:1;padding:11px 6px;background:#EEF3F9;color:#3C7CBD;border:1px solid #CBD9EA;border-radius:8px;font-family:'Archivo',sans-serif;font-weight:800;font-size:10px;letter-spacing:0.5px;cursor:pointer;\">{{ epngLabel }}<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ onESVG }}\" style=\"flex:1;padding:11px 6px;background:#EEF3F9;color:#3C7CBD;border:1px solid #CBD9EA;border-radius:8px;font-family:'Archivo',sans-serif;font-weight:800;font-size:10px;letter-spacing:0.5px;cursor:pointer;\">{{ esvgLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">\n          <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:11px;letter-spacing:2.5px;color:#a9a493;\">CAROUSEL<\u002Fspan>\n          <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:10px;color:#fff;background:#4180BE;border-radius:10px;padding:2px 8px;\">{{ carouselCount }}<\u002Fspan>\n        <\u002Fdiv>\n        <button sc-camel-on-click=\"{{ onAddSlide }}\" style=\"width:100%;padding:12px;background:#fff;color:#4180BE;border:1.5px solid #4180BE;border-radius:8px;font-family:'Archivo',sans-serif;font-weight:800;font-size:11px;letter-spacing:1px;cursor:pointer;\">+ Add Current Slide<\u002Fbutton>\n        <sc-if value=\"{{ hasCarousel }}\">\n          <button sc-camel-on-click=\"{{ onExportPDF }}\" style=\"width:100%;margin-top:8px;padding:13px;background:#3C7CBD;color:#F3F1E8;border:none;border-radius:8px;font-family:'Archivo',sans-serif;font-weight:800;font-size:11px;letter-spacing:1px;cursor:pointer;box-shadow:0 4px 12px rgba(60,124,189,0.28);\">{{ pdfLabel }}<\u002Fbutton>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noCarousel }}\">\n          <button disabled=\"\" style=\"width:100%;margin-top:8px;padding:13px;background:#F3F1E8;color:#b7b3a3;border:1px solid #E4E0D2;border-radius:8px;font-family:'Archivo',sans-serif;font-weight:800;font-size:11px;letter-spacing:1px;cursor:not-allowed;\">Export Carousel PDF<\u002Fbutton>\n        <\u002Fsc-if>\n        <p style=\"margin:9px 0 0;font-family:'Archivo',sans-serif;font-weight:500;font-size:9.5px;line-height:1.5;color:#a9a493;\">Build your slide, add it, repeat — then export a LinkedIn-ready multi-page PDF at 1080×1350.<\u002Fp>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ loadErr }}\">\n        <p style=\"margin:0;font-family:'Archivo',sans-serif;font-size:10px;color:#b5552f;\">{{ loadErr }}<\u002Fp>\n      <\u002Fsc-if>\n\n    <\u002Faside>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { ready:false, layoutKey:'cover', colourwayKey:'creamField', graphicKey:null, busy:'', loadErr:'', content:{}, hashtag:'#DINNERBYFIRELIGHT', images:{}, genType:'starburst', genOpts:{ points:16, inner:0.6 }, carousel:[], theme:'blue', transforms:{}, xfTarget:0, toast:'', textDy:{} };\n\n  componentDidMount(){\n    const base = document.baseURI;\n    Promise.all([ import(new URL('./slidekit.js', base).href), import(new URL('./pdfkit.js', base).href) ])\n      .then(([m, p]) => { this.kit = m; this.pdf = p; this.restoreShapes(m); this.setState({ ready:true }); this._fontsP = this.embedFonts(); })\n      .catch(e => { this.setState({ loadErr:'Could not load engine: '+(e && e.message || e) }); });\n  }\n\n  svgEl(html){\n    return React.createElement('div', { style:{ width:'100%', height:'100%', display:'block', lineHeight:0 }, dangerouslySetInnerHTML:{ __html:html } });\n  }\n\n  selectLayout(k){ this.setState({ layoutKey:k, graphicKey:null }); }\n  selectColourway(k){ this.setState({ colourwayKey:k }); }\n  selectGraphic(k){ this.setState(s => ({ graphicKey: s.graphicKey===k ? null : k })); }\n  setTheme(t){ this.setState({ theme:t }); }\n  xfKey(s){ s=s||this.state; return s.layoutKey==='photoCollage' ? (s.layoutKey+'#'+(s.xfTarget||0)) : s.layoutKey; }\n  setTransform(key, val){ this.setState(s => { const kk=this.xfKey(s); const cur = s.transforms[kk] || { s:1, dx:0, dy:0 }; const nx = Object.assign({}, cur, { [key]: val }); return { transforms: Object.assign({}, s.transforms, { [kk]: nx }) }; }); }\n  resetTransform(){ this.setState(s => { const t = Object.assign({}, s.transforms); delete t[this.xfKey(s)]; const td = Object.assign({}, s.textDy); delete td[s.layoutKey]; return { transforms:t, textDy:td }; }); }\n  setTextDy(val){ this.setState(s => ({ textDy: Object.assign({}, s.textDy, { [s.layoutKey]: val }) })); }\n  setXfTarget(i){ this.setState({ xfTarget:i }); }\n  showToast(msg){ clearTimeout(this._toastT); this.setState({ toast:msg }); this._toastT=setTimeout(()=>this.setState({ toast:'' }), 2400); }\n  deleteShape(id){\n    const k=this.kit; const i=k.GRAPHIC_ORDER.indexOf(id);\n    if(i>=0) k.GRAPHIC_ORDER.splice(i,1); delete k.GRAPHICS[id];\n    try{ const raw=localStorage.getItem('bks_shapes_v1'); if(raw){ localStorage.setItem('bks_shapes_v1', JSON.stringify(JSON.parse(raw).filter(s=>s.id!==id))); } }catch(e){}\n    this.setState(s => ({ graphicKey: s.graphicKey===id ? null : s.graphicKey }));\n  }\n\n  setField(field, val){\n    this.setState(s => {\n      const lc = Object.assign({}, s.content[s.layoutKey], { [field]: val });\n      return { content: Object.assign({}, s.content, { [s.layoutKey]: lc }) };\n    });\n  }\n  setHashtag(val){ this.setState({ hashtag: val }); }\n  uploadImage(i, file){\n    if(!file) return;\n    const rd = new FileReader();\n    rd.onload = () => this.setState(s => {\n      const arr = (s.images[s.layoutKey] || []).slice(); arr[i] = rd.result;\n      return { images: Object.assign({}, s.images, { [s.layoutKey]: arr }) };\n    });\n    rd.readAsDataURL(file);\n  }\n  removeImage(i){\n    this.setState(s => {\n      const arr = (s.images[s.layoutKey] || []).slice(); arr[i] = null;\n      return { images: Object.assign({}, s.images, { [s.layoutKey]: arr }) };\n    });\n  }\n  slideOpts(extra){\n    const { layoutKey, colourwayKey, graphicKey, content, hashtag, images, theme, transforms, textDy } = this.state;\n    const co = Object.assign({}, content[layoutKey] || {}, { hashtag });\n    let transform=null, tarr=null;\n    if(layoutKey==='photoCollage'){ tarr=[ transforms['photoCollage#0']||null, transforms['photoCollage#1']||null ]; }\n    else { transform = transforms[layoutKey] || null; }\n    return Object.assign({ layoutKey, colourwayKey, graphicKey, theme, content: co, images: images[layoutKey] || [], transform, transforms: tarr, textDy: textDy[layoutKey] || 0 }, extra || {});\n  }\n  imgEl(url){\n    return url\n      ? React.createElement('div', { style:{ width:'100%', height:'100%', backgroundImage:`url(${url})`, backgroundSize:'cover', backgroundPosition:'center' } })\n      : React.createElement('div', { style:{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', background:'#EFF4FA', color:'#9bb4d1', fontSize:'9px', fontWeight:800, letterSpacing:'1px' } }, 'NO PHOTO');\n  }\n\n  // ---- font embedding for crisp PNG export ----\n  async embedFonts(){\n    try{\n      const specs = [['Playfair Display',700],['Playfair Display',800],['Pinyon Script',400],['Archivo',500],['Archivo',700],['Archivo',800]];\n      const faces = await Promise.all(specs.map(s => this.fetchFace(s[0], s[1]).catch(()=> '')));\n      this._fontCSS = faces.filter(Boolean).join('\\n');\n    }catch(e){ this._fontCSS = ''; }\n  }\n  async fetchFace(family, weight){\n    const fam = family.replace(/ /g,'+');\n    const css = await (await fetch(`https://fonts.googleapis.com/css2?family=${fam}:wght@${weight}&display=swap`)).text();\n    let woff = null;\n    for(const b of css.split('/*')){ if(/^\\s*latin\\s*\\*\\//.test(b)){ const m = b.match(/url\\((https:[^)]+\\.woff2)\\)/); if(m){ woff = m[1]; break; } } }\n    if(!woff){ const m = css.match(/url\\((https:[^)]+\\.woff2)\\)/); woff = m && m[1]; }\n    if(!woff) return '';\n    const buf = await (await fetch(woff)).arrayBuffer();\n    return `@font-face{font-family:'${family}';font-style:normal;font-weight:${weight};font-display:swap;src:url(data:font/woff2;base64,${this.ab2b64(buf)}) format('woff2');}`;\n  }\n  ab2b64(buf){ let bin=''; const b=new Uint8Array(buf), c=0x8000; for(let i=0;i<b.length;i+=c){ bin+=String.fromCharCode.apply(null, b.subarray(i,i+c)); } return btoa(bin); }\n\n  withFonts(svg){ return this._fontCSS ? svg.replace(/(<svg[^>]*>)/, `$1<defs><style>${this._fontCSS}<\u002Fstyle><\u002Fdefs>`) : svg; }\n  download(url, name){ const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url), 2000); }\n  canvasToBlob(cv, type, q){ return new Promise(r => cv.toBlob(r, type, q)); }\n  async rasterizeCanvas(svg, w, h, bg){\n    const url = URL.createObjectURL(new Blob([svg], { type:'image/svg+xml;charset=utf-8' }));\n    try{\n      const img = new Image();\n      await new Promise((res,rej)=>{ img.onload=res; img.onerror=()=>rej(new Error('SVG render failed')); img.src=url; });\n      const cv = document.createElement('canvas'); cv.width=w; cv.height=h;\n      const ctx = cv.getContext('2d');\n      if(bg){ ctx.fillStyle=bg; ctx.fillRect(0,0,w,h); }\n      ctx.imageSmoothingQuality='high'; ctx.drawImage(img, 0, 0, w, h);\n      return cv;\n    } finally { URL.revokeObjectURL(url); }\n  }\n\n  async exportPNG(){\n    if(!this.kit || this.state.busy) return;\n    this.setState({ busy:'png' });\n    try{\n      if(this._fontsP) await this._fontsP;\n      const { layoutKey, colourwayKey } = this.state;\n      const svg = this.withFonts(this.kit.buildSlide(this.slideOpts({ sizeAttr:'width=\"1080\" height=\"1350\"' })));\n      const cv = await this.rasterizeCanvas(svg, 2160, 2700, null);\n      const blob = await this.canvasToBlob(cv, 'image/png');\n      this.download(URL.createObjectURL(blob), `brandkit-${layoutKey}-${colourwayKey}.png`);\n    }catch(e){ this.setState({ loadErr:'PNG export failed: '+(e&&e.message||e) }); }\n    this.setState({ busy:'' });\n  }\n\n  async exportElement(fmt){\n    if(!this.kit || this.state.busy) return;\n    const { colourwayKey, layoutKey, graphicKey } = this.state;\n    const C = this.kit.resolveCW(colourwayKey, this.state.theme);\n    const g = graphicKey || this.kit.LAYOUTS[layoutKey].defaultGraphic;\n    this.setState({ busy: fmt==='svg' ? 'esvg' : 'epng' });\n    try{\n      if(this._fontsP) await this._fontsP;\n      if(fmt==='svg'){\n        const svg = this.withFonts(this.kit.buildElementSVG(g, C, { transparent:true }));\n        this.download(URL.createObjectURL(new Blob([svg], { type:'image/svg+xml;charset=utf-8' })), `element-${g}.svg`);\n      } else {\n        const svg = this.withFonts(this.kit.buildElementSVG(g, C, { transparent:true, sizeAttr:'width=\"1280\" height=\"1280\"' }));\n        const cv = await this.rasterizeCanvas(svg, 1280, 1280, null);\n        const blob = await this.canvasToBlob(cv, 'image/png');\n        this.download(URL.createObjectURL(blob), `element-${g}.png`);\n      }\n    }catch(e){ this.setState({ loadErr:'Element export failed: '+(e&&e.message||e) }); }\n    this.setState({ busy:'' });\n  }\n\n  addToCarousel(){ const snap = JSON.parse(JSON.stringify(this.slideOpts())); this.setState(s => ({ carousel: s.carousel.concat([snap]) })); }\n  removeSlide(i){ this.setState(s => ({ carousel: s.carousel.filter((_,j)=>j!==i) })); }\n  moveSlide(i, dir){ this.setState(s => { const a=s.carousel.slice(), j=i+dir; if(j<0||j>=a.length) return null; const t=a[i]; a[i]=a[j]; a[j]=t; return { carousel:a }; }); }\n  async exportCarouselPDF(){\n    if(!this.kit || !this.pdf || this.state.busy || !this.state.carousel.length) return;\n    this.setState({ busy:'pdf' });\n    try{\n      if(this._fontsP) await this._fontsP;\n      const jpegs=[];\n      for(const snap of this.state.carousel){\n        const svg = this.withFonts(this.kit.buildSlide(Object.assign({}, snap, { sizeAttr:'width=\"1080\" height=\"1350\"' })));\n        const cv = await this.rasterizeCanvas(svg, 2160, 2700, '#ffffff');\n        jpegs.push(cv.toDataURL('image/jpeg', 0.92));\n      }\n      const blob = this.pdf.imagesToPdf(jpegs, 2160, 2700, 1080, 1350);\n      this.download(URL.createObjectURL(blob), 'brandkit-carousel.pdf');\n    }catch(e){ this.setState({ loadErr:'PDF export failed: '+(e&&e.message||e) }); }\n    this.setState({ busy:'' });\n  }\n\n  genDefaults(type){ const d={}; (this.kit.SHAPE_PARAMS[type]||[]).forEach(p=> d[p.key]=p.def); return d; }\n  setGenType(type){ this.setState({ genType:type, genOpts:this.genDefaults(type) }); }\n  setGenParam(key, val){ this.setState(s => ({ genOpts: Object.assign({}, s.genOpts, { [key]:val }) })); }\n  saveShape(){\n    const k=this.kit, type=this.state.genType, opts=Object.assign({}, this.state.genOpts);\n    const n=(this._customN=(this._customN||0)+1), id='gen'+n;\n    const label=(k.SHAPE_LABELS[type]||'Shape')+' '+n;\n    k.GRAPHICS[id]={ label, cat:'shape', gen:true, render:k.makeShape(type, opts) };\n    k.GRAPHIC_ORDER.push(id);\n    try{ const raw=localStorage.getItem('bks_shapes_v1'); const arr=raw?JSON.parse(raw):[]; arr.push({id,type,opts,label}); localStorage.setItem('bks_shapes_v1', JSON.stringify(arr)); }catch(e){}\n    this.setState({ graphicKey:id });\n    this.showToast('✓ '+label+' saved & placed on your slide');\n  }\n  restoreShapes(k){\n    try{\n      const raw=localStorage.getItem('bks_shapes_v1'); if(!raw) return;\n      JSON.parse(raw).forEach(s=>{\n        if(s && s.id && !k.GRAPHICS[s.id]){ k.GRAPHICS[s.id]={ label:s.label, cat:'shape', gen:true, render:k.makeShape(s.type, s.opts) }; k.GRAPHIC_ORDER.push(s.id); }\n        const n=parseInt(String(s.id).replace('gen',''),10); if(n>(this._customN||0)) this._customN=n;\n      });\n    }catch(e){}\n  }\n\n  renderVals(){\n    const k = this.kit;\n    if(!k) return { ready:false, notReady:true, loadErr:this.state.loadErr,\n      layoutCount:'', graphicCount:'', caption:'', hashtag:this.state.hashtag,\n      exportLabel:'Export PNG · 1080×1350', epngLabel:'Transparent PNG', esvgLabel:'Vector SVG',\n      pdfLabel:'Export Carousel PDF', carouselCount:0, genPreviewEl:null, transformTitle:'SIZE & POSITION', toast:'',\n      textDyParam:{ label:'Move Text ↕', min:-320, max:320, step:5, value:0, display:'0', onInput:()=>{} } };\n    const { layoutKey, colourwayKey, graphicKey, busy, content, hashtag, images, theme, transforms, textDy } = this.state;\n    const C = k.resolveCW(colourwayKey, theme);\n    const curGraphic = graphicKey || k.LAYOUTS[layoutKey].defaultGraphic;\n    const co = content[layoutKey] || {};\n    const imgs = images[layoutKey] || [];\n    const hashOpt = { hashtag };\n\n    const tStyle = sel => ({ display:'flex', flexDirection:'column', width:'100%', padding:0, border: sel?'3px solid #4180BE':'1px solid #DBD7C9', borderRadius:8, background:'#fff', cursor:'pointer', overflow:'hidden', boxShadow: sel?'0 5px 16px rgba(65,128,190,0.28)':'0 1px 2px rgba(0,0,0,0.04)', transition:'box-shadow .12s, border-color .12s' });\n    const box = ar => ({ width:'100%', aspectRatio:ar, display:'block', background:'#fff' });\n\n    const layoutThumbs = k.LAYOUT_ORDER.map(key => {\n      const L = k.LAYOUTS[key], sel = key===layoutKey;\n      return { key, label:L.label, style:tStyle(sel), boxStyle:box('1080/1350'),\n        el:this.svgEl(k.buildSlide({ layoutKey:key, colourwayKey, graphicKey:null, theme, content:hashOpt, images:images[key]||[] })),\n        select:()=>this.selectLayout(key) };\n    });\n    const colourwayThumbs = k.COLOURWAY_ORDER.map(key => {\n      const CW = k.resolveCW(key, theme), sel = key===colourwayKey;\n      return { key, label:CW.label, style:tStyle(sel), boxStyle:box('1080/1350'),\n        el:this.svgEl(k.buildSlide(this.slideOpts({ colourwayKey:key }))),\n        select:()=>this.selectColourway(key) };\n    });\n    const graphicThumbs = k.GRAPHIC_ORDER.map(key => {\n      const G = k.GRAPHICS[key
